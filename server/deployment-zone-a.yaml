apiVersion: apps/v1
kind: Deployment
metadata:
  name: podinfo-ap-southeast-5a
  namespace: infrastructure-engineering
  labels:
    app: podinfo
    zone: ap-southeast-5a
spec:
  replicas: 3
  selector:
    matchLabels:
      app: podinfo
      zone: ap-southeast-5a
  template:
    metadata:
      labels:
        app: podinfo
        zone: ap-southeast-5a
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: topology.kubernetes.io/zone
                    operator: In
                    values:
                      - ap-southeast-5a
      containers:
        - name: podinfo
          image: ghcr.io/stefanprodan/podinfo:latest
          ports:
            - containerPort: 9898
              name: http
---
apiVersion: v1
kind: Service
metadata:
  name: podinfo-ap-southeast-5a
  namespace: infrastructure-engineering
  labels:
    app: podinfo
    zone: ap-southeast-5a
spec:
  selector:
    app: podinfo
    zone: ap-southeast-5a
  ports:
    - port: 9898
      targetPort: http
      name: http
